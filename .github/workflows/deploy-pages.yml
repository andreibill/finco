name: Deploy finco-web to GitHub Pages

# Construieste prototipul finco-web si il publica pe GitHub Pages la fiecare push
# pe main. Publicarea o face runner-ul GitHub (nu un push local de gh-pages).
on:
  push:
    branches: [main]
    paths:
      - "finco-web/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un singur deploy odata; anuleaza rularile in curs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finco-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: finco-web/package-lock.json
      - run: npm ci
      - run: npm run build
      # GitHub Pages nu face SPA fallback: servim 404.html (= index) la deep-link/refresh.
      - name: SPA fallback (404 = index.html)
        run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: finco-web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
